<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Roboboy - Your AI Friend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #14B8A6;
            --primary-dark: #0D9488;
            --primary-light: #2DD4BF;
            --bg: #F0FFFE;
            --white: #FFFFFF;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Welcome Screen */
        .welcome-screen {
            background: var(--white);
            border-radius: 0;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: none;
            display: block;
        }

        .welcome-screen.hidden {
            display: none;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(20, 184, 166, 0.4);
        }

        .logo svg {
            width: 60px;
            height: 60px;
        }

        .welcome-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: var(--gray-500);
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            border: none;
            padding: 18px 40px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(20, 184, 166, 0.4);
            width: 100%;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(20, 184, 166, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* Chat Screen */
        .chat-screen {
            background: var(--white);
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            height: 700px;
            max-height: 90vh;
            max-height: 90dvh; /* Dynamic viewport height for mobile */
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .chat-screen.active {
            display: flex;
        }

        /* Chat Header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top)); /* iOS safe area for notch */
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0; /* Prevent shrinking */
        }

        .header-avatar {
            width: 45px;
            height: 45px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header-avatar svg {
            width: 28px;
            height: 28px;
        }

        /* Animated Robot Avatar */
        .robot-face {
            animation: blink 4s infinite;
            transform-origin: center;
        }

        @keyframes blink {
            0%, 96%, 100% {
                transform: scaleY(1);
            }
            98% {
                transform: scaleY(0.1);
            }
        }

        .header-info h1 {
            color: var(--white);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .header-info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            padding: 20px;
            padding-bottom: 10px;
            overflow-y: auto;
            background: linear-gradient(180deg, var(--bg) 0%, #E8FFFD 100%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .message.bot .message-avatar {
            background: var(--white);
        }

        .message.user .message-avatar {
            background: var(--gray-300);
        }

        .message-avatar svg {
            width: 20px;
            height: 20px;
        }

        .message-content {
            background: var(--white);
            padding: 12px 16px;
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .message.user .message-content {
            background: var(--white);
            color: var(--gray-900);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 11px;
            color: var(--gray-500);
            margin-top: 5px;
            text-align: right;
        }

        .message.user .message-time {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Chat Input */
        .chat-input-area {
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); /* iOS safe area */
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0; /* Prevent shrinking */
        }

        .text-input {
            flex: 1;
            padding: 15px 20px;
            background: var(--gray-100);
            border: none;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .text-input:focus {
            background: var(--gray-200);
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .mic-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            animation: recordPulse 1s infinite;
        }

        @keyframes recordPulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            }
            50% {
                box-shadow: 0 4px 25px rgba(239, 68, 68, 0.5);
            }
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 15px 20px;
        }

        .typing-indicator.hidden {
            display: none;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--gray-300);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* Robot Avatar Animation */
        .robot-avatar {
            width: 100%;
            height: 100%;
        }

        .robot-eye {
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 96%, 100% {
                transform: scaleY(1);
            }
            98% {
                transform: scaleY(0.1);
            }
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }

        /* Responsive - Mobile */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .welcome-screen,
            .chat-screen {
                border-radius: 0;
                height: 100vh;
                height: 100dvh; /* Dynamic viewport height */
                max-height: 100vh;
                max-height: 100dvh;
                max-width: 100%;
            }

            .welcome-screen {
                padding: 30px 20px;
            }

            .logo {
                width: 100px;
                height: 100px;
                margin: 0 auto 20px;
            }

            .welcome-title {
                font-size: 22px;
            }

            .welcome-subtitle {
                font-size: 14px;
            }

            .start-btn {
                padding: 16px 30px;
                font-size: 16px;
            }

            /* Chat header - smaller on mobile */
            .chat-header {
                padding: 15px;
            }

            .header-avatar {
                width: 40px;
                height: 40px;
            }

            .header-info h1 {
                font-size: 18px;
            }

            .header-info p {
                font-size: 12px;
            }

            .header-status span {
                display: none; /* Hide "Online" text on mobile */
            }

            /* Messages - adjust for mobile */
            .chat-messages {
                padding: 15px;
            }

            .message {
                max-width: 90%;
            }

            .message-avatar {
                width: 30px;
                height: 30px;
            }

            .message-content {
                padding: 10px 14px;
                font-size: 14px;
            }

            /* Input area - compact on mobile */
            .chat-input-area {
                padding: 12px 15px;
            }

            .text-input {
                padding: 12px 16px;
                font-size: 14px;
            }

            .send-btn,
            .mic-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }

        /* Responsive - Tablet */
        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 10px;
            }

            .welcome-screen {
                padding: 35px 25px;
                max-width: 500px;
            }

            .logo {
                width: 110px;
                height: 110px;
            }

            .chat-screen {
                max-width: 600px;
                height: 80vh;
            }

            .header-avatar {
                width: 42px;
                height: 42px;
            }

            .message-avatar {
                width: 32px;
                height: 32px;
            }

            .send-btn,
            .mic-btn {
                width: 48px;
                height: 48px;
            }
        }

        /* Responsive - Small tablets / Large phones */
        @media (min-width: 769px) and (max-width: 1024px) {
            body {
                padding: 15px;
            }

            .chat-screen {
                max-width: 700px;
                height: 75vh;
            }

            .welcome-screen {
                max-width: 450px;
            }
        }
    </style>
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="logo">
            <svg viewBox="0 0 100 100" class="robot-avatar">
                <!-- Teal outer circle -->
                <circle cx="50" cy="50" r="48" fill="#14B8A6"/>
                <!-- White ring -->
                <circle cx="50" cy="50" r="28" fill="white"/>
                <!-- Teal face -->
                <circle cx="50" cy="50" r="20" fill="#14B8A6"/>
                <!-- Eyes with pupils (animated) -->
                <g class="robot-face">
                    <circle cx="43" cy="47" r="4" fill="white"/>
                    <circle cx="43" cy="47" r="2" fill="#14B8A6"/>
                    <circle cx="57" cy="47" r="4" fill="white"/>
                    <circle cx="57" cy="47" r="2" fill="#14B8A6"/>
                    <!-- Small mouth -->
                    <ellipse cx="50" cy="56" rx="3" ry="4" fill="white"/>
                </g>
            </svg>
        </div>
        <h1 class="welcome-title">Welcome to Roboboy! 🤖</h1>
        <p class="welcome-subtitle">Your friendly AI companion. Let's chat!</p>
        <button class="start-btn" onclick="startChat()">Start Chat</button>
    </div>

    <!-- Chat Screen -->
    <div class="chat-screen" id="chatScreen">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-avatar">
                <svg viewBox="0 0 100 100">
                    <!-- Teal outer circle -->
                    <circle cx="50" cy="50" r="48" fill="#14B8A6"/>
                    <!-- White ring -->
                    <circle cx="50" cy="50" r="28" fill="white"/>
                    <!-- Teal face -->
                    <circle cx="50" cy="50" r="20" fill="#14B8A6"/>
                    <!-- Eyes with pupils -->
                    <g class="robot-face">
                        <circle cx="43" cy="47" r="4" fill="white"/>
                        <circle cx="43" cy="47" r="2" fill="#14B8A6"/>
                        <circle cx="57" cy="47" r="4" fill="white"/>
                        <circle cx="57" cy="47" r="2" fill="#14B8A6"/>
                        <!-- Small mouth -->
                        <ellipse cx="50" cy="56" rx="3" ry="4" fill="white"/>
                    </g>
                </svg>
            </div>
            <div class="header-info">
                <h1>Roboboy</h1>
                <p>Always here to help</p>
            </div>
            <div class="header-status">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-avatar">
                    <svg viewBox="0 0 100 100">
                        <!-- Teal outer circle -->
                        <circle cx="50" cy="50" r="48" fill="#14B8A6"/>
                        <!-- White ring -->
                        <circle cx="50" cy="50" r="28" fill="white"/>
                        <!-- Teal face -->
                        <circle cx="50" cy="50" r="20" fill="#14B8A6"/>
                        <!-- Eyes with pupils -->
                        <g class="robot-face">
                            <circle cx="43" cy="47" r="4" fill="white"/>
                            <circle cx="43" cy="47" r="2" fill="#14B8A6"/>
                            <circle cx="57" cy="47" r="4" fill="white"/>
                            <circle cx="57" cy="47" r="2" fill="#14B8A6"/>
                            <!-- Small mouth -->
                            <ellipse cx="50" cy="56" rx="3" ry="4" fill="white"/>
                        </g>
                    </svg>
                </div>
                <div class="message-content">
                    <div class="message-text">Hi! I'm Roboboy, your AI friend. How can I help you today? 😊</div>
                    <div class="message-time">Now</div>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator hidden" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="textInput" class="text-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)" />
            <button class="send-btn" id="sendBtn" onclick="sendTextMessage()">
                📤
            </button>
            <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                🎤
            </button>
        </div>
    </div>

    <script>
        // Config
        const SERVER_URL = window.location.origin;
        let TTS_VOICE = 'indian-male';
        
        // Audio context for playback
        let audioContext = null;
        let audioEnabled = false;
        
        // Enable audio on first user interaction
        document.addEventListener('click', function enableAudio() {
            if (!audioEnabled) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioContext.resume();
                audioEnabled = true;
                console.log('✓ Audio enabled by user gesture');
            }
        }, { once: false });
        
        // State
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let isProcessing = false;

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendTextMessage();
            }
        }

        // Send text message
        async function sendTextMessage() {
            const textInput = document.getElementById('textInput');
            const userText = textInput.value.trim();
            
            if (!userText) return;
            
            // Clear input
            textInput.value = '';
            
            // Add user message
            addMessage('user', userText);
            
            // Show typing indicator
            document.getElementById('typingIndicator').classList.remove('hidden');
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            
            // Process message (skip STT, go straight to AI)
            try {
                console.log('Sending message:', userText);
                const aiResponse = await getAIResponse(userText, detectLanguage(userText));
                
                console.log('AI response:', aiResponse);
                
                document.getElementById('typingIndicator').classList.add('hidden');
                addMessage('bot', aiResponse);
                
                // Speak response
                console.log('Calling speakText with:', aiResponse);
                await speakText(aiResponse);
                console.log('speakText completed');
                
            } catch (err) {
                console.error('Process error:', err);
                document.getElementById('typingIndicator').classList.add('hidden');
                addMessage('bot', 'Sorry, something went wrong. Try again! 😅');
            }
        }

        // Start chat
        function startChat() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('active');
            
            // Enable audio playback on user gesture
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioContext.resume();
            
            console.log('✓ Audio context enabled');
        }

        // Toggle recording
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        // Start recording
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg;codecs=opus' });
                    await processVoice(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('micBtn').innerHTML = '⏹️';
                
            } catch (err) {
                console.error('Mic error:', err);
                addMessage('user', 'Error: Microphone access denied');
            }
        }

        // Stop recording
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                if (mediaRecorder.stream) {
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
            }
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('micBtn').innerHTML = '🎤';
        }

        // Process voice
        async function processVoice(audioBlob) {
            try {
                console.log('Processing voice:', audioBlob.size, 'bytes');
                
                // Step 1: STT
                const sttResult = await transcribeAudio(audioBlob);
                const userText = sttResult.text;
                
                console.log('STT result:', sttResult);
                
                if (!userText || userText.trim() === '') {
                    addMessage('bot', "Sorry, I couldn't hear you clearly. Try again! 👂");
                    return;
                }
                
                addMessage('user', userText);
                
                // Show typing indicator
                document.getElementById('typingIndicator').classList.remove('hidden');
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                
                // Step 2: AI response
                const aiResponse = await getAIResponse(userText, detectLanguage(userText));
                
                // Hide typing indicator
                document.getElementById('typingIndicator').classList.add('hidden');
                
                addMessage('bot', aiResponse);
                
                // Step 3: TTS
                await speakText(aiResponse);
                
            } catch (err) {
                console.error('Process error:', err);
                document.getElementById('typingIndicator').classList.add('hidden');
                addMessage('bot', 'Error: ' + err.message + ' 😕');
            }
        }

        // Transcribe audio
        async function transcribeAudio(audioBlob) {
            const formData = new FormData();
            let ext = 'webm';
            if (audioBlob.type.includes('ogg')) ext = 'ogg';
            formData.append('file', audioBlob, `voice.${ext}`);
            
            console.log('Sending audio for transcription:', audioBlob.size, 'bytes, type:', audioBlob.type);
            
            const response = await fetch(`${SERVER_URL}/transcribe`, {
                method: 'POST',
                body: formData
            });
            
            console.log('STT response status:', response.status);
            
            if (!response.ok) {
                const errorText = await response.text();
                console.error('STT error:', errorText);
                throw new Error('STT failed: ' + response.status + ' - ' + errorText);
            }
            
            const data = await response.json();
            console.log('STT result:', data);
            return {
                text: data.text || '',
                language: data.language || 'auto'
            };
        }

        // Get AI response
        async function getAIResponse(userText, detectedLang = 'auto') {
            const apiKey = ''; // API key handled by server proxy
            
            const langPrompts = {
                'en': 'You are Roboboy, a friendly Singaporean AI assistant. Respond in English with Singlish style. Use words like "lah", "leh", "meh", "shiok" naturally. Keep responses concise (1-2 sentences). Be helpful, warm, and humorous.',
                'zh': '你是一个友好的新加坡AI助手Roboboy。用中文（普通话）回复。保持回复简洁（1-2句话）。要友好、温暖、幽默。',
                'ms': 'Anda adalah Roboboy, pembantu AI Singapura yang mesra. Balas dalam Bahasa Melayu. Kekalkan jawapan ringkas (1-2 ayat). Jadilah membantu, hangat, dan lucu.',
                'ta': 'நீங்கள் ரோபோபாய், ஒரு நட்பு சிங்கப்பூர் AI உதவியாளர். தமிழில் பதிலளிக்கவும். பதில்களை சுருக்கமாக வைத்திருங்கள் (1-2 வாக்கியங்கள்). உதவியாக, சூடாக, வேடிக்கையாக இருங்கள்.',
                'auto': 'You are Roboboy, a friendly Singaporean AI assistant. Respond in the SAME LANGUAGE that the user spoke. Keep responses concise (1-2 sentences). Be helpful, warm, and humorous.'
            };
            
            const systemPrompt = langPrompts[detectedLang] || langPrompts['auto'];
            
            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': 'proxy'
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userText }
                        ],
                        max_tokens: 150,
                        temperature: 0.7
                    })
                });
                
                if (!response.ok) {
                    throw new Error('AI API failed: ' + response.status);
                }
                
                const data = await response.json();
                return data.choices[0].message.content.trim();
                
            } catch (err) {
                console.error('AI error:', err);
                return "Sorry, I'm having trouble thinking right now. Try again later lah! 🤖";
            }
        }

        // Detect language from text
        function detectLanguage(text) {
            // Check for Chinese characters
            if (/[\u4e00-\u9fff]/.test(text)) return 'zh';
            // Check for Tamil characters
            if (/[\u0b80-\u0bff]/.test(text)) return 'ta';
            // Check for Malay/Indonesian common words
            if (/\b(apa|khabar|kabar|selamat|pagi|petang|malam|terima|kasih|sama|ada|dan|yang|untuk|dengan|ini|itu|saya|anda|dia|tidak|adalah|akan|dari|pada|atau|dalam|ke|di|sudah|belum|boleh|harus)\b/i.test(text)) return 'ms';
            // Default to English
            return 'en';
        }

        // Get voice based on language
        function getVoiceForLanguage(lang) {
            switch(lang) {
                case 'zh': return 'chinese-male';
                case 'ms': return 'singapore-male';
                case 'ta': return 'tamil-male';
                default: return TTS_VOICE; // Use default voice
            }
        }

        // Speak text
        async function speakText(text) {
            try {
                // Auto-detect language and select appropriate voice
                const detectedLang = detectLanguage(text);
                const voice = getVoiceForLanguage(detectedLang);
                
                console.log('TTS request:', text.substring(0, 50) + '...', 'lang:', detectedLang, 'voice:', voice);
                
                // Add cache-busting parameter
                const cacheBust = `?_t=${Date.now()}`;
                
                const response = await fetch(`${SERVER_URL}/tts/json${cacheBust}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Cache-Control': 'no-cache'
                    },
                    body: JSON.stringify({
                        text: text,
                        voice: voice
                    })
                });
                
                console.log('TTS response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('TTS error response:', errorText);
                    throw new Error('TTS failed: ' + response.status);
                }
                
                const data = await response.json();
                console.log('TTS audio received:', data.audio ? data.audio.length : 0, 'bytes');
                
                const audioUrl = `data:audio/mp3;base64,${data.audio}`;
                
                const audio = new Audio(audioUrl);
                
                // Ensure audio context is active
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Handle autoplay policy
                audio.play().then(() => {
                    console.log('✓ Audio playing');
                }).catch(err => {
                    console.error('✗ Autoplay blocked, waiting for user gesture...');
                    // Play on next click
                    document.addEventListener('click', function playAudio() {
                        audio.play().then(() => console.log('✓ Audio playing after gesture'));
                        document.removeEventListener('click', playAudio);
                    }, { once: true });
                });
                
                audio.onended = () => {
                    console.log('TTS playback complete');
                };
                
                audio.onerror = (err) => {
                    console.error('Audio playback error:', err);
                };
                
            } catch (err) {
                console.error('TTS error:', err);
            }
        }

        // Add message to chat
        function addMessage(sender, text) {
            const messagesDiv = document.getElementById('chatMessages');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const botAvatarSvg = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#14B8A6"/><circle cx="50" cy="50" r="28" fill="white"/><circle cx="50" cy="50" r="20" fill="#14B8A6"/><g class="robot-face"><circle cx="43" cy="47" r="4" fill="white"/><circle cx="43" cy="47" r="2" fill="#14B8A6"/><circle cx="57" cy="47" r="4" fill="white"/><circle cx="57" cy="47" r="2" fill="#14B8A6"/><ellipse cx="50" cy="56" rx="3" ry="4" fill="white"/></g></svg>`;
            const userAvatarSvg = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#6B7280"/></svg>`;
            
            const avatarSvg = sender === 'bot' ? botAvatarSvg : userAvatarSvg;
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatarSvg}</div>
                <div class="message-content">
                    <div class="message-text">${text}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Handle orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                const chatMessages = document.getElementById('chatMessages');
                if (chatMessages) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }, 300);
        });

        // Fix for iOS Safari - ensure input is visible when keyboard opens
        const textInput = document.getElementById('textInput');
        if (textInput) {
            textInput.addEventListener('focus', () => {
                setTimeout(() => {
                    textInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });
        }

        // Prevent zoom on double-tap (mobile)
        document.addEventListener('dblclick', (e) => {
            e.preventDefault();
        }, { passive: false });

        console.log('🤖 Roboboy Modern UI loaded!');
    </script>
</body>
