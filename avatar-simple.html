<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboboy Avatar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F0FFFE;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .avatar-container {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(20, 184, 166, 0.4);
            margin-bottom: 30px;
        }
        
        .avatar-face {
            width: 100px;
            height: 100px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .eye {
            width: 15px;
            height: 15px;
            background: #14B8A6;
            border-radius: 50%;
            animation: blink 4s infinite;
        }
        
        @keyframes blink {
            0%, 96%, 100% { transform: scaleY(1); }
            98% { transform: scaleY(0.1); }
        }
        
        .title {
            color: #111827;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #6B7280;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="avatar-container">
        <div class="avatar-face">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>
    
    <h1 class="title">Roboboy</h1>
    <p class="subtitle">Your AI Friend</p>
</body>
</html>
